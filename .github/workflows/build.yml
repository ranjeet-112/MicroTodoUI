name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: microtodo-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: |
          pwd
          ls -la
          find . -name Dockerfile

      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        run: docker build -f ./Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/microtodo-ui:${{ github.run_number }} -t ${{ secrets.DOCKER_USERNAME }}/microtodo-ui:latest .

      - name: Push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/microtodo-ui:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/microtodo-ui:latest
